services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: appointment-sql-server
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
    ports:
      - "14330:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
        test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 30s


  user-service:
    image: user-service
    build:
      context: .
      dockerfile: UserService/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Server=sql-server,1433;Database=UserDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
    ports:
      - "8081:8080"
    depends_on:
      sql-server:
        condition: service_healthy

  appointment-service:
    image: appointment-service
    build:
      context: .
      dockerfile: AppointmentService/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Server=sql-server,1433;Database=AppointmentDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True"
      Services__UserService: "http://user-service:8080"
    ports:
      - "8082:8080"
    depends_on:
      sql-server:
        condition: service_healthy
      user-service:
        condition: service_started

  api-gateway:
    image: api-gateway
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - appointment-service

volumes:
  sqlserver_data: