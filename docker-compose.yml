services:
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: appointment-sql-server
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Software2026resdvxcvd!"
    ports:
      - "14330:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  user-service:
    image: user-service
    build:
      context: .
      dockerfile: UserService/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Server=sql-server,1433;Database=UserDb;User Id=sa;Password=Software2026resdvxcvd!;TrustServerCertificate=True"
    ports:
      - "8081:8080"
    depends_on:
      - sql-server

  appointment-service:
    image: appointment-service
    build:
      context: .
      dockerfile: AppointmentService/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Server=sql-server,1433;Database=AppointmentDb;User Id=sa;Password=Software2026resdvxcvd!;TrustServerCertificate=True"
      Services__UserService: "http://user-service:8080"
    ports:
      - "8082:8080"
    depends_on:
      - sql-server
      - user-service

  api-gateway:
    image: api-gateway
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - appointment-service

volumes:
  sqlserver_data: